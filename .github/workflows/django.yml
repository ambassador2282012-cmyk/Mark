name: Build Mark Windows EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository files
        run: dir

      - name: Show Mark folder
        run: dir Mark

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r Mark/requirements.txt

      - name: Build EXE
        run: cd Mark && pyinstaller --onefile --windowed --name Mark main.py

      - name: Show dist files
        run: dir Mark\dist /s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mark-Windows
          path: Mark/dist/**
          if-no-files-found: error
          overwrite: true
