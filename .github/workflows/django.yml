name: Build Mark Windows EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: dir

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r Mark/requirements.txt

      - name: Build EXE
        run: cd Mark && pyinstaller Mark.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mark-Windows
          path: Mark/dist/Mark.exe
